name: CI/CD Pipeline - Deploy to Azure Web App

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

env:
  AZURE_WEBAPP_NAME: "ProductSvc"   # Change to your Web App name
  DOTNET_VERSION: '10.0.x'          # .NET 10 (Preview)

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          include-prerelease: true   # 🔥 IMPORTANT for .NET 10

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run tests
        run: dotnet test --no-build --configuration Release --verbosity normal

      - name: Publish application
        run: dotnet publish -c Release -o publish

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: publish/

  deploy-to-azure:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (startsWith(github.ref, 'refs/heads/master') || startsWith(github.ref, 'refs/heads/main'))

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: publish/

      # 🔍 Validate credentials (safe debug)
      - name: Validate AZURE_CREDENTIALS
        run: echo '${{ secrets.AZURE_CREDENTIALS }}' | python3 -c "import sys,json; d=json.load(sys.stdin); print('clientId:', 'OK' if d.get('clientId') else 'MISSING'); print('tenantId:', 'OK' if d.get('tenantId') else 'MISSING'); print('subscriptionId:', 'OK' if d.get('subscriptionId') else 'MISSING')"

      # 🔐 Azure Login
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # ✅ This step will confirm your issue is resolved
      - name: Verify Azure Access
        run: |
          az account show
          az account list --output table

      # 🚀 Deploy
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: publish/

      - name: Azure Logout
        run: az logout